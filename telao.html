<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Telão - Cronômetro
</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container-telao{
    text-align: center;
    width: 100%;
    padding: 40px;
}

.titulo-sessao-telao{
    font-size: 48px;
    font-weight: bold;
    color: #1f73d2;
    margin-bottom: 40px;
}

.status-telao{
    font-size: 72px;
    font-weight: bold;
    color: #666;
    margin-bottom: 30px;
}

.orador-atual-telao{
    font-size: 96px;
    font-weight: bold;
    color: #1f73d2;
    margin-bottom: 30px;
    text-transform: uppercase;
}

.cronometro-telao{
    font-size: 200px;
    font-weight: bold;
    color: #2e7d32;
    margin-bottom: 30px;
    font-family: 'Courier New', monospace;
}

.proximo-orador-telao{
    font-size: 48px;
    color: #888;
    margin-top: 40px;
}

</style>

</head>

<body>

<div class="container-telao">

    <div class="titulo-sessao-telao" id="tituloSessaoTelao">
        CONSIDERAÇÕES FINAIS
    </div>

    <div class="status-telao">
        USANDO A PALAVRA
    </div>

    <div class="orador-atual-telao" id="oradorAtualTelao">
        AGUARDANDO INÍCIO
    </div>

    <div class="cronometro-telao" id="cronometroTelao">
        05:00
    </div>

    <div class="proximo-orador-telao" id="proximoOradorTelao">
        Próximo Orador: ---
    </div>

</div>

<script>

let errosSyncConsecutivos = 0;

function sincronizarTelao(){

    try{

        const raw = localStorage.getItem('estadoCronometro');

        if(!raw){
            return;
        }

        const dados = JSON.parse(raw);

        const tituloEl = document.getElementById('tituloSessaoTelao');
        const oradorEl = document.getElementById('oradorAtualTelao');
        const cronoEl = document.getElementById('cronometroTelao');
        const proxEl = document.getElementById('proximoOradorTelao');

        if(!tituloEl || !oradorEl || !cronoEl || !proxEl){
            console.error('Telão: elementos do DOM não encontrados');
            return;
        }

        tituloEl.textContent = dados.tituloSessao || 'CONSIDERAÇÕES FINAIS';
        oradorEl.textContent = dados.oradorAtual || 'AGUARDANDO INÍCIO';
        cronoEl.textContent = dados.cronometro || '05:00';
        proxEl.textContent = dados.proximoOrador || 'Próximo Orador: ---';

        if(errosSyncConsecutivos > 0){
            oradorEl.style.color = '';
            errosSyncConsecutivos = 0;
        }

    } catch(e){

        errosSyncConsecutivos++;
        console.error('Erro ao sincronizar telão:', e);

        if(errosSyncConsecutivos >= 3){
            const oradorEl = document.getElementById('oradorAtualTelao');
            if(oradorEl){
                oradorEl.textContent = '⚠ ERRO DE SINCRONIZAÇÃO';
                oradorEl.style.color = '#d32f2f';
            }
        }

    }

}

setInterval(sincronizarTelao, 500);

</script>

</body>

</html>
